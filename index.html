<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GO-FOR-GOLD | Member Gateway</title>
    
    <!-- Memberstack Script -->
    <script data-memberstack-app="app_cmlt23jfd002u0stjhljd13s9" src="https://static.memberstack.com/scripts/v2/memberstack.js" type="text/javascript"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #c5a059; --dark-bg: #0f0f0f; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        
        body { 
            background: radial-gradient(circle at center, #1a1a1a 0%, #0f0f0f 100%); 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        /* Container for the Gateway UI */
        .container { text-align: center; max-width: 400px; width: 90%; display: none; }
        
        .logo-container { margin-bottom: 40px; }
        .logo-image { max-width: 280px; height: auto; display: block; margin: 0 auto; }
        
        .btn { 
            background-color: var(--gold); 
            color: #000; 
            padding: 20px; 
            text-decoration: none; 
            font-weight: bold; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            font-size: 14px; 
            display: block; 
            transition: all 0.3s ease; 
            border: none; 
            cursor: pointer; 
            width: 100%; 
        }
        .btn:hover { background-color: #e2c07d; box-shadow: 0 0 20px rgba(197, 160, 89, 0.3); }
        
        .forgot-link { 
            display: inline-block; 
            margin-top: 25px; 
            color: rgba(255,255,255,0.4); 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            text-decoration: none; 
            cursor: pointer; 
        }

        /* Full-screen Iframe for Gamma */
        #member-content { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            border: none; 
            z-index: 100;
        }

        /* Loading state */
        #loading-screen { color: var(--gold); font-family: 'Cinzel', serif; letter-spacing: 2px; }

        /* HIDE THE KITCHEN ACADEMY LOGO IN THE LOGIN MODAL */
        #msOverlay [data-element="modal-logo"] {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- 1. Loading Screen -->
    <div id="loading-screen">VERIFYING ACCESS...</div>

    <!-- 2. The Gateway UI (Logged Out) -->
    <div class="container" id="gateway-ui">
        <div class="logo-container">
            <img src="GO-FOR-GOLD%20CLUB%20LOGO.png" alt="GO-FOR-GOLD CLUB" class="logo-image">
        </div>

        <button data-ms-modal="login" class="btn">
            Member Access
        </button>

        <a data-ms-modal="forgot-password" class="forgot-link">
            Reset Password
        </a>
    </div>

    <!-- 3. The Wrapped Content (Logged In) -->
    <iframe id="member-content" src="https://landing-page-8yan0s4.gamma.site/landing-page"></iframe>

    <script>
    window.$memberstackDom.getCurrentMember().then(({ data: member }) => {
        const loading = document.getElementById('loading-screen');
        const gateway = document.getElementById('gateway-ui');
        const content = document.getElementById('member-content');

        // Always hide loading once we have a response
        loading.style.display = 'none';

        if (member) {
            // Check for the specific Gold Plan
            const planConnections = member.planConnections || [];
            const hasGoldPlan = planConnections.some(p => p.planId === 'pln_go-for-gold-club-membership-o0su0eqg');

            if (hasGoldPlan) {
                // SUCCESS: Show the iframe, stay on GitHub URL
                content.style.display = 'block';
                gateway.style.display = 'none';
            } else {
                // Logged in but wrong plan
                gateway.style.display = 'block';
                content.style.display = 'none';
            }
        } else {
            // Not logged in
            gateway.style.display = 'block';
            content.style.display = 'none';
        }
    }).catch((error) => {
        console.error("Auth Error:", error);
        document.getElementById('loading-screen').innerText = "ERROR LOADING ACCESS";
    });

    // Refresh page on logout to reset the UI
    window.$memberstackDom.on('member.loggedOut', () => {
        window.location.reload();
    });
    </script>
</body>
</html>
